<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>§ 荒糖羽愛ㄉ神秘辰葆 §</title>
    <style>
        /* --- 1. 捲軸樣式 (維持不變) --- */
        body::-webkit-scrollbar { width: 10px; }
        body::-webkit-scrollbar-track { background: #c3e487; }
        body::-webkit-scrollbar-thumb { background: rgb(26, 110, 40); border-radius: 10px; }

        /* --- 2. 基礎設定 --- */
        body {
            background-color: #bee9db;
            background-image: radial-gradient(#ffffff 20%, transparent 20%);
            background-size: 30px 30px;
            /* 手機上游標通常看不到，但在電腦上保留 */
            cursor: url('https://cur.cursors-4u.net/symbols/sym-1/sym49.cur'), auto;
            margin: 0;
            font-family: "Microsoft JhengHei", "新細明體", sans-serif;
            overflow-x: hidden; /* 防止手機版左右晃動 */
        }

        /* --- 3. 核心佈局 --- */
        .layout-container {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
        }

        /* --- 4. 側邊欄樣式 --- */
        .sidebar {
            width: 250px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.6);
            border: 2px dashed #072e52;
            border-radius: 15px;
            padding: 15px;
            height: fit-content;
            text-align: center;
        }

        .sidebar-avatar img {
            width: 150px;
            height: 150px;
            border: 5px solid #fff;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            margin-bottom: 10px;
        }

        .sidebar-info {
            font-size: 13px;
            color: #072e52;
            margin-bottom: 20px;
            border-bottom: 1px dotted #072e52;
            padding-bottom: 10px;
        }

        .menu-btn {
            display: block;
            background: #57b157;
            color: white;
            text-decoration: none;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 2px solid #147725;
            font-weight: bold;
            transition: 0.2s;
        }
        .menu-btn:hover { background: #ff99cc; border-color: #ff6699; transform: scale(1.05); }

        .article-list { text-align: left; margin-top: 20px; }
        .article-list h3 { font-size: 16px; color: #072e52; background: #99ffcf; padding: 5px; text-align: center; margin-bottom: 10px; }
        .article-list ul { list-style: none; padding: 0; }
        .article-list li { margin-bottom: 8px; font-size: 14px; border-bottom: 1px dashed #ccc; padding-bottom: 3px; }
        .article-list li::before { content: "♥ "; color: #ff6699; }

        /* --- 5. 主內容區 --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%; /* 確保內容佔滿 */
        }

        .h1-wrapper { text-align: center; width: 100%; margin-top: 20px; }
        
        h1 {
            display: inline-block;
            background-color: transparent;
            border: 6px solid #072e52;
            text-align: center;
            color: #ebb917;
            -webkit-text-stroke: 2px #0fbeb0;
            font-weight: 999;
            font-size: 80px;
            padding: 10px 30px;
            /* 讓標題文字在手機上會自動換行 */
            word-wrap: break-word; 
            max-width: 100%;
        }

        .box01 {
            width: 100%;
            max-width: 600px;
            height: 600px;
            background: linear-gradient(100deg, rgb(207, 241, 53), #f3f2f2, rgb(199, 206, 173));
            margin: 50px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            border-radius: 50%; /* 改成 50% 會永遠是圓形 */
            box-shadow: 10px 15px 5px 10px #527423b6;
            color: rgb(19, 51, 11);
            text-align: center;
            font-size: 80px;
            font-weight: 900;
            line-height: 1.2;
            letter-spacing: 2px;
        }

        .box01:hover {
            background: linear-gradient(100deg, rgb(135, 158, 34), #b6b4b4, rgb(222, 230, 193));
            transform: scale(1.05) rotate(5deg);
            transition: 0.3s;
        }

        /* --- 6. 留言板 --- */
        .guestbook-container {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.8);
            margin: 0 auto 50px auto;
            padding: 20px;
            border: 3px double #7daa43;
            border-radius: 15px;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }
        .gb-header { text-align: center; border-bottom: 2px dashed #99ffcf; margin-bottom: 20px; padding-bottom: 10px; color: #072e52; }
        .input-area { background: #a8b6a9; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .input-area .row { margin-bottom: 10px; }
        .input-area label { font-weight: bold; color: #072e52; display: block; margin-bottom: 5px; } /* 手機上標籤換行比較好看 */
        .input-area input, .input-area textarea { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #8c941d; background: #fff; border-radius: 5px; }
        .input-area button { width: 100%; background: #57b157; color: white; border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; box-shadow: 2px 2px 0px #147725; margin-top: 10px;}
        .input-area button:active { transform: translate(2px, 2px); box-shadow: none; }
        .comment-item { display: flex; padding: 15px 0; border-bottom: 1px dashed #99ffcf; }
        .avatar img { width: 50px; height: 50px; border: 1px solid #ccc; padding: 2px; background: #fff; margin-right: 15px; }
        .content { flex: 1; min-width: 0; /* 防止文字撐破版面 */ }
        .info { font-size: 12px; color: #244117; margin-bottom: 5px; }
        .info .name { color: #30ce10; font-weight: bold; font-size: 14px; margin-right: 10px; }
        .info .floor { float: right; color: #ccc; }
        .reply { background: #f1f1f1; font-size: 13px; color: #555; padding: 8px; margin-top: 10px; border-left: 3px solid #93d121; }
        .admin-name { color: #398139; font-weight: bold; }

        /* ========================================= */
        /* ★★★ 手機版專用設定 (RWD) 開始 ★★★ */
        /* 當螢幕寬度小於 768px (平板或手機) 時，執行以下設定 */
        /* ========================================= */
        @media screen and (max-width: 768px) {
            
            /* 1. 把左右並排改成上下堆疊 */
            .layout-container {
                flex-direction: column;
                padding: 10px; /* 減少邊距 */
            }

            /* 2. 側邊欄變寬 */
            .sidebar {
                width: 100%; /* 佔滿螢幕寬度 */
                box-sizing: border-box; /* 確保內距不撐破寬度 */
            }

            /* 3. 標題縮小 */
            h1 {
                font-size: 40px; /* 從 100px 縮小到 40px */
                border-width: 3px; /* 邊框變細 */
                -webkit-text-stroke: 1px #0fbeb0;
                padding: 5px 10px;
            }

            /* 4. 大圓圈縮小 */
            .box01 {
                width: 300px;       /* 縮小寬度 */
                height: 300px;      /* 縮小高度 */
                font-size: 40px;    /* 字體縮小 */
                margin: 20px auto;  /* 減少間距 */
                border-radius: 50%;
            }

            /* 5. 留言板寬度調整 */
            .guestbook-container {
                width: 100%; /* 佔滿 */
                padding: 10px;
            }
            
            /* 6. 輸入框調整 */
            .input-area label {
                margin-bottom: 5px;
            }
        }
        /* ★★★ 手機版設定 結束 ★★★ */

    </style>
</head>

<body>

    <div class="layout-container">
        <aside class="sidebar">
            <div class="sidebar-avatar">
                <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Sugar" alt="荒糖羽愛">
            </div>
            <div class="sidebar-info">
                <p>ID：荒糖羽愛</p>
                <p>心情：天氣晴 ☀</p>
                <p>今日人氣：999</p>
            </div>
            <nav>
                <a href="#" class="menu-btn">相簿 Album</a>
                <a href="#" class="menu-btn">網誌 Blog</a>
                <a href="#" class="menu-btn">影音 Video</a>
                <a href="#" class="menu-btn">好友 Bon Bon</a>
            </nav>
            <div class="article-list">
                <h3>★ 最新文章 ★</h3>
                <ul>
                    <li>今天心情真好...</li>
                    <li>[自拍] 昨天去逛街</li>
                    <li>轉貼：心理測驗</li>
                    <li>好想吃草莓蛋糕喔</li>
                    <li>(鎖) 只有我看得到的秘密</li>
                </ul>
            </div>
        </aside>

        <main class="main-content">
            <div class="h1-wrapper">
                <h1>***愛の回憶錄***</h1>
            </div>
            
            <div class="box01">
                *** bi li bi li 魔法降臨 *** </div>

            <div class="guestbook-container">
                <div class="gb-header">
                    <h3>★~ 訪客留言版 ~★</h3>
                    <span style="font-size: 12px; color: #666;">( 記得要推推才可以走喔！ )</span>
                </div>
                <div class="input-area">
                    <div class="row">
                        <label>暱稱：</label>
                        <input type="text" id="nickname" placeholder="路人甲">
                    </div>
                    <div class="row">
                        <label>留言：</label>
                        <textarea id="message" rows="3" placeholder="來灌水一下吧..."></textarea>
                    </div>
                    <button onclick="addComment()">送出留言</button>
                </div>
                <div class="comment-list" id="commentList">
                    <div class="comment-item">
                        <div class="avatar">
                            <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Felix" alt="頭貼">
                        </div>
                        <div class="content">
                            <div class="info">
                                <span class="name">路過的鄉民</span>
                                <span class="time">2006/08/30 14:20</span>
                                <span class="floor">#1</span>
                            </div>
                            <div class="text">頭香！版主好久不見～網頁做得好漂亮喔！</div>
                            <div class="reply">
                                <span class="admin-name">【版主回覆】：</span>
                                謝謝你的支持 <(￣︶￣)>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function addComment() {
            var name = document.getElementById("nickname").value;
            var msg = document.getElementById("message").value;
            if(name == "" || msg == "") {
                alert("欸！要記得填寫暱稱和留言喔！(ˋ^ˊ)〉");
                return;
            }
            var date = new Date();
            var timeString = date.getFullYear() + "/" + (date.getMonth()+1) + "/" + date.getDate();
            var randomSeed = Math.floor(Math.random() * 100);
            
            var newHtml = `
                <div class="comment-item">
                    <div class="avatar">
                        <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=${randomSeed}" alt="頭貼">
                    </div>
                    <div class="content">
                        <div class="info">
                            <span class="name">${name}</span>
                            <span class="time">${timeString} (剛才)</span>
                            <span class="floor">New!</span>
                        </div>
                        <div class="text">${msg}</div>
                    </div>
                </div>
            `;
            var list = document.getElementById("commentList");
            list.insertAdjacentHTML('afterbegin', newHtml);
            document.getElementById("nickname").value = "";
            document.getElementById("message").value = "";
        }
    </script>
</body>
</html>
